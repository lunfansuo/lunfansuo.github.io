	<h1>短线数据并不靠谱<aside><em>2021.03.11</em></aside></h1>
	
<p> </p>

<p>今天试了一下短线数据指标，找到了一个盘前竞价 +10% 的罗平锌业，但是从一开盘就不断下跌，目前已经下跌了 4%。这个损失太大了，只是玩一下就已把我的总盈利全扔进去。</p>

<p>也许短线能看到的机会真的是机会，但一上来就梭哈显然是太冲动。我昨天选择的中国国航和横店影视都是上升的，虽然上升较慢，但是很好很稳妥。中国国航今天上升了 3.2%。但已被我一个罗平锌业全赔进去。</p>
